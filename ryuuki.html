<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>大塚模写</title>
        <style>
            .wrapper {
                display: flex;
                gap: 20px;
                justify-content: center;
                align-items: center;
            }
            .wrap {
                width: 300px;
                height: 300px;
                margin: 250px auto;
                box-shadow: 0 4px 4px rgba(0, 0, 0, 0.25);
                border-radius: 8px;
                position: relative;
                overflow: hidden;
                transition: 0.25s;
                &:hover {
                    .overlay {
                        top: 0;
                    }
                }
                img {
                    width: 100%;
                    height: 100%;
                    border-radius: 8px;
                }
                .overlay {
                    width: 300px;
                    height: 300px;
                    position: absolute;
                    top: -300px;
                    left: 0;
                    background-color: rgba(255, 255, 255, 0.75);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    transition: 0.25s;
                    h2 {
                        font-size: 50px;
                        transform: skewY(-12deg);
                        text-align: center;
                    }
                }
            }
        </style>
    </head>
    <body>
        <div class="wrapper">
            <div class="wrap">
                <img src="images/img_test01_s.jpg" alt="" />
                <div class="overlay">
                    <h2>
                        大塚から<br />
                        はばたけ
                    </h2>
                </div>
            </div>
            <div class="wrap">
                <img src="images/img_test02_s.jpg" alt="" />
                <div class="overlay">
                    <h2>
                        大塚は<br />
                        夢を叶える
                    </h2>
                </div>
            </div>
            <div class="wrap">
                <img src="images/img_test03_s.jpg" alt="" />
                <div class="overlay">
                    <h2>
                        大塚なら<br />
                        できる
                    </h2>
                </div>
            </div>
        </div>
    </body>
</html>
